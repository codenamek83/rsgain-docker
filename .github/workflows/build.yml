name: RSGain - Manual Docker Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo with full history and PAT
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCKER_GIT_ACTIONS }}

      # Fetch latest upstream tag
      - name: Fetch latest upstream tag
        id: upstream
        run: |
          TAG=$(git ls-remote --tags https://github.com/complexlogic/rsgain.git \
            | awk -F/ '{print $3}' \
            | sort -V \
            | tail -n 1)
          echo "Latest upstream tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Validate tag
      - name: Validate tag
        run: |
          if [ -z "${{ steps.upstream.outputs.tag }}" ]; then
            echo "Upstream tag is empty. Aborting."
            exit 1
          fi

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_GIT_ACTIONS }}

      # Build and push multi-arch Docker image
      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --build-arg RSGAIN_VERSION=${{ steps.upstream.outputs.tag }} \
            -f Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/rsgain:latest \
            -t ghcr.io/${{ github.repository_owner }}/rsgain:${{ steps.upstream.outputs.tag }} \
            --push \
            .

      # Save new tag locally
      - name: Save new tag
        run: echo "${{ steps.upstream.outputs.tag }}" > .upstream-tag

      # Commit updated tag back to repo
      - name: Commit updated tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .upstream-tag
          git commit -m "Update upstream tag to ${{ steps.upstream.outputs.tag }}" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.DOCKER_GIT_ACTIONS }}@github.com/${{ github.repository }} HEAD:main