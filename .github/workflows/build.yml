# Name of the workflow as it appears in the GitHub Actions tab
name: RSGain - Manual Docker Build

# Defines the events that trigger this workflow
on:
  push:
    branches:
      - main           # Triggers automatically when code is pushed to the main branch
    paths-ignore:
      - '.upstream-tag' # Prevents an infinite loop: changes to this file won't re-trigger the workflow
  pull_request:        # Triggers when a pull request is opened or updated against any branch
  workflow_dispatch:   # Allows manually triggering the workflow from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest # Runs the job on the latest Ubuntu runner provided by GitHub

    steps:
      # Step 1: Clone the current repository into the runner environment
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags (useful for version tracking)
          token: ${{ secrets.DOCKER_GIT_ACTIONS }} # Uses a custom PAT token to allow pushing changes back later

      # Step 2: Query the upstream repository to find its most recent version tag
      - name: Fetch latest upstream tag
        id: upstream
        run: |
          # Fetch remote tags from the target repo, filter out the tag names, sort them by version, and pick the latest
          TAG=$(git ls-remote --tags https://github.com/complexlogic/rsgain.git \
            | awk -F/ '{print $3}' \
            | sort -V \
            | tail -n 1)
          echo "Latest upstream tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT # Saves the tag as an output variable for subsequent steps

      # Step 3: Ensure the tag retrieval didn't fail or return an empty string
      - name: Validate tag
        run: |
          if [ -z "${{ steps.upstream.outputs.tag }}" ]; then
            echo "Upstream tag is empty. Aborting."
            exit 1
          fi

      # Step 4: Initialize Docker Buildx for multi-architecture building capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Authenticate with GitHub Packages Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_GIT_ACTIONS }}

      # Step 6: Build the multi-arch image and push it to GHCR
      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --build-arg RSGAIN_VERSION=${{ steps.upstream.outputs.tag }} \
            -f Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/rsgain:latest \
            -t ghcr.io/${{ github.repository_owner }}/rsgain:${{ steps.upstream.outputs.tag }} \
            --push \
            .

      # Step 7: Write the newly built tag to the local tracking file
      - name: Save new tag
        run: echo "${{ steps.upstream.outputs.tag }}" > .upstream-tag

      # Step 8: Commit and push the updated tracking file back to your repository
      - name: Commit updated tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .upstream-tag
          # Commits changes, or outputs a fallback message if the tag hasn't actually changed since the last build
          git commit -m "Update upstream tag to ${{ steps.upstream.outputs.tag }} [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.DOCKER_GIT_ACTIONS }}@github.com/${{ github.repository }} HEAD:main